<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دشبورد پیش‌بینی آب و هوا - 5 روز آینده</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="cityInput" placeholder="نام شهر را وارد کنید..." />
                    <button id="searchBtn" class="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <button id="locationBtn" class="location-btn" title="موقعیت فعلی">
                    <i class="fas fa-map-marker-alt"></i>
                </button>
            </div>
        </header>

        <!-- Current Weather Section -->
        <section class="current-weather" id="currentWeather">
            <div class="weather-main">
                <div class="location-info">
                    <h1 id="cityName">تهران</h1>
                    <p id="currentDate"></p>
                </div>
                <div class="weather-icon">
                    <i id="weatherIcon" class="fas fa-sun"></i>
                </div>
                <div class="temperature">
                    <span id="currentTemp">25</span>
                    <span class="unit">°C</span>
                </div>
                <div class="weather-description">
                    <p id="weatherDesc">آفتابی</p>
                </div>
            </div>
            <div class="weather-details">
                <div class="detail-item">
                    <i class="fas fa-eye"></i>
                    <span>رطوبت</span>
                    <span id="humidity">65%</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-wind"></i>
                    <span>باد</span>
                    <span id="windSpeed">12 km/h</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-thermometer-half"></i>
                    <span>احساس</span>
                    <span id="feelsLike">28°C</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-tint"></i>
                    <span>فشار</span>
                    <span id="pressure">1013 hPa</span>
                </div>
            </div>
        </section>

        <!-- 5-Day Forecast Section -->
        <section class="forecast-section">
            <h2>پیش‌بینی 5 روز آینده</h2>
            <div class="forecast-container" id="forecastContainer">
                <!-- Forecast cards will be dynamically generated here -->
            </div>
        </section>

        <!-- Loading Spinner -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>در حال بارگذاری...</p>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-triangle"></i>
            <p>خطا در دریافت اطلاعات آب و هوا</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
