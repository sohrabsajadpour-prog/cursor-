<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد آب و هوا - پیش‌بینی 5 روزه</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Vazir:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-cloud-sun"></i> داشبورد آب و هوا</h1>
            <div class="search-container">
                <input type="text" id="cityInput" placeholder="نام شهر را وارد کنید..." />
                <button id="searchBtn"><i class="fas fa-search"></i></button>
                <button id="locationBtn" title="موقعیت فعلی"><i class="fas fa-location-dot"></i></button>
            </div>
        </header>

        <!-- Loading Spinner -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>در حال بارگذاری...</p>
        </div>

        <!-- Error Message -->
        <div id="error" class="error hidden">
            <i class="fas fa-exclamation-triangle"></i>
            <p id="errorMessage"></p>
        </div>

        <!-- Current Weather -->
        <div id="currentWeather" class="current-weather hidden">
            <div class="current-info">
                <div class="location">
                    <h2 id="cityName"></h2>
                    <p id="currentDate"></p>
                </div>
                <div class="temperature">
                    <span id="currentTemp"></span>
                    <div class="weather-icon">
                        <i id="currentIcon"></i>
                    </div>
                </div>
            </div>
            <div class="weather-description">
                <p id="weatherDescription"></p>
            </div>
            <div class="weather-details">
                <div class="detail-item">
                    <i class="fas fa-eye"></i>
                    <span>دید</span>
                    <span id="visibility"></span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-tint"></i>
                    <span>رطوبت</span>
                    <span id="humidity"></span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-wind"></i>
                    <span>باد</span>
                    <span id="windSpeed"></span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-thermometer-half"></i>
                    <span>احساس دما</span>
                    <span id="feelsLike"></span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-compress-arrows-alt"></i>
                    <span>فشار هوا</span>
                    <span id="pressure"></span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-sun"></i>
                    <span>شاخص UV</span>
                    <span id="uvIndex"></span>
                </div>
            </div>
        </div>

        <!-- 5-Day Forecast -->
        <div id="forecast" class="forecast hidden">
            <h3><i class="fas fa-calendar-days"></i> پیش‌بینی 5 روز آینده</h3>
            <div class="forecast-container" id="forecastContainer">
                <!-- Forecast items will be dynamically added here -->
            </div>
        </div>

        <!-- Hourly Forecast -->
        <div id="hourlyForecast" class="hourly-forecast hidden">
            <h3><i class="fas fa-clock"></i> پیش‌بینی ساعتی</h3>
            <div class="hourly-container" id="hourlyContainer">
                <!-- Hourly items will be dynamically added here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
