<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دشبورد پیش‌بینی آب و هوا - 5 روز آینده</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <i class="fas fa-cloud-sun"></i>
                    دشبورد آب و هوا
                </h1>
                <p class="subtitle">پیش‌بینی 5 روز آینده</p>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="cityInput" placeholder="نام شهر را وارد کنید..." class="search-input">
                    <button id="searchBtn" class="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <button id="locationBtn" class="location-btn">
                    <i class="fas fa-map-marker-alt"></i>
                    موقعیت فعلی
                </button>
            </div>
        </section>

        <!-- Current Weather Section -->
        <section class="current-weather" id="currentWeather">
            <div class="weather-card current-card">
                <div class="weather-info">
                    <div class="location-info">
                        <h2 id="currentCity">تهران</h2>
                        <p id="currentDate">امروز</p>
                    </div>
                    <div class="temperature">
                        <span id="currentTemp">25</span>
                        <span class="unit">°C</span>
                    </div>
                </div>
                <div class="weather-details">
                    <div class="weather-icon">
                        <i id="currentIcon" class="fas fa-sun"></i>
                    </div>
                    <div class="weather-description">
                        <p id="currentDescription">آفتابی</p>
                        <div class="weather-stats">
                            <div class="stat">
                                <i class="fas fa-eye"></i>
                                <span id="currentVisibility">10 کیلومتر</span>
                            </div>
                            <div class="stat">
                                <i class="fas fa-tint"></i>
                                <span id="currentHumidity">45%</span>
                            </div>
                            <div class="stat">
                                <i class="fas fa-wind"></i>
                                <span id="currentWind">15 کیلومتر/ساعت</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 5-Day Forecast Section -->
        <section class="forecast-section">
            <h3 class="section-title">پیش‌بینی 5 روز آینده</h3>
            <div class="forecast-container" id="forecastContainer">
                <!-- Forecast cards will be dynamically generated here -->
            </div>
        </section>

        <!-- Loading Spinner -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>در حال بارگذاری...</p>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-triangle"></i>
            <p>خطا در دریافت اطلاعات آب و هوا</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
